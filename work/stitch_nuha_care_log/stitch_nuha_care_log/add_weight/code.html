<style>
        body {
            background-color: #fbfbe2;
            font-family: 'Quicksand', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 20px 20px -4px rgba(85, 97, 88, 0.06);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #556158;
            box-shadow: 0 0 0 2px rgba(85, 97, 88, 0.1);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-background fixed top-0 w-full z-50 flex justify-between items-center px-container-margin py-md">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-surface-variant/20 transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Nuha Care</h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden border-2 border-primary/10">
<img alt="Nuha's profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuChlo8oddLHYSMLdsi3Xxy4yKXBT16TMKT0J5UZJ7pdpZDffPJ6ItC2hUO2mWziUpemEmn7wmjJQ6A6KaNz9D80wfMstomboikFHAFWOPtKWAYWuKqGFrDPkg5h6hS8j0CxypifLEHs-8b1eTTw6PLnRSSE8A9FZVMkpMrTnom7N_uw6vNDilq6hYUA4_ZEsc9aXqJ2oebBuC4vDbbL3aYZNOkezGUVZO1FDfaWN3Un9NAg8w-wloTuv8ydFxYINB5tgO37P-B8rA"/>
</div>
</header>
<main class="pt-24 px-container-margin max-w-lg mx-auto">
<!-- Main Title -->
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Log Weight</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Daily growth tracking for Nuha</p>
</div>
<!-- Weight Input Card -->
<section class="bg-surface-container-lowest rounded-lg p-lg soft-shadow mb-card-gap flex flex-col items-center">
<div class="flex flex-col items-center gap-2 mb-md">
<span class="font-label-caps text-label-caps text-primary tracking-widest">CURRENT WEIGHT</span>
<div class="flex items-baseline gap-2">
<input autofocus="" class="w-40 text-center font-headline-lg text-headline-lg bg-surface-container-low rounded-md py-4 border-none focus:ring-2 focus:ring-primary/20 text-primary" placeholder="00.0" step="0.1" type="number"/>
<span class="font-headline-md text-headline-md text-on-surface-variant">kg</span>
</div>
</div>
<div class="w-full grid grid-cols-2 gap-sm">
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-2">Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md p-md font-body-md text-body-md appearance-none" type="date" value="2023-11-20"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary pointer-events-none">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-2">Time</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-md p-md font-body-md text-body-md appearance-none" type="time" value="09:30"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary pointer-events-none">schedule</span>
</div>
</div>
</div>
</section>
<!-- Alert Notification (Gentle Stewardship) -->
<section class="bg-tertiary-container rounded-lg p-md mb-card-gap flex items-start gap-4 animate-float">
<div class="bg-tertiary text-on-tertiary p-2 rounded-full">
<span class="material-symbols-outlined text-[20px]">trending_down</span>
</div>
<div>
<h4 class="font-label-sm text-label-sm text-on-tertiary-fixed font-bold">Gentle Note</h4>
<p class="font-body-md text-body-md text-on-tertiary-fixed-variant">Weight decreased from last log (8.2 kg). Monitor closely and check hydration.</p>
</div>
</section>
<!-- Notes Field -->
<section class="bg-surface-container-lowest rounded-lg p-lg soft-shadow mb-lg">
<div class="flex items-center gap-2 mb-sm">
<span class="material-symbols-outlined text-on-surface-variant">notes</span>
<label class="font-label-sm text-label-sm text-on-surface-variant">Observation Notes</label>
</div>
<textarea class="w-full bg-surface-container-low border-none rounded-md p-md font-body-md text-body-md resize-none focus:ring-2 focus:ring-primary/20" placeholder="Any changes in appetite or behavior?" rows="3"></textarea>
</section>
<!-- Action Button -->
<div class="flex flex-col gap-md">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-full font-headline-md text-headline-md flex items-center justify-center gap-2 active:scale-95 transition-all duration-200 shadow-lg shadow-primary/20">
<span>Save Log</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
<button class="w-full py-3 font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors duration-200">
                Cancel
            </button>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-6 pt-2 bg-surface-container shadow-[0_-4px_20px_-4px_rgba(85,97,88,0.06)] rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:opacity-80 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-2xl px-4 py-2 hover:opacity-80 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history_edu</span>
<span class="font-label-sm text-label-sm">Logs</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:opacity-80 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">restaurant</span>
<span class="font-label-sm text-label-sm">Meals</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:opacity-80 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">medication</span>
<span class="font-label-sm text-label-sm">Meds</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:opacity-80 active:scale-95 transition-all duration-200" href="#">
<span class="material-symbols-outlined">event</span>
<span class="font-label-sm text-label-sm">Appts</span>
</a>
</nav>
<script>
        // Micro-interaction for input tactile feel
        const weightInput = document.querySelector('input[type="number"]');
        weightInput.addEventListener('input', (e) => {
            if (e.target.value.length > 5) e.target.value = e.target.value.slice(0, 5);
        });

        // Simple button ripple effect simulation
        const saveBtn = document.querySelector('button.bg-primary');
        saveBtn.addEventListener('click', function(e) {
            const btn = e.currentTarget;
            btn.classList.add('brightness-110');
            setTimeout(() => btn.classList.remove('brightness-110'), 200);
            
            // Logic for "Saving..."
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span><span>Saving...</span>';
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>Logged!</span>';
                btn.classList.replace('bg-primary', 'bg-tertiary');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-tertiary', 'bg-primary');
                }, 2000);
            }, 1200);
        });
    </script>
</body></html>
