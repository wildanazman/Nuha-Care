<main class="px-container-margin mt-2 max-w-2xl mx-auto">

<form class="space-y-lg" id="daily-log-form">

<div class="grid grid-cols-4 gap-base">
<button class="option-card flex flex-col items-center justify-center p-sm bg-surface-container-highest rounded-lg transition-all duration-200 hover:opacity-80" onclick="selectOption(this, 'condition')" type="button">

<button class="option-card flex flex-col items-center justify-center p-sm bg-surface-container-highest rounded-lg transition-all duration-200 hover:opacity-80" onclick="selectOption(this, 'condition')" type="button">

</button>
<button class="option-card flex flex-col items-center justify-center p-sm bg-surface-container-highest rounded-lg transition-all duration-200 hover:opacity-80" onclick="selectOption(this, 'condition')" type="button">
<span class="text-3xl mb-1">😐</span>
<span class="font-label-sm text-label-sm">Okay</span>
</button>
<button class="option-card flex flex-col items-center justify-center p-sm bg-surface-container-highest rounded-lg transition-all duration-200 hover:opacity-80" onclick="selectOption(this, 'condition')" type="button">
<span class="text-3xl mb-1">🥱</span>
<span class="font-label-sm text-label-sm">Tired</span>
</button>
</div>
</div>
<!-- Appetite & Drinking -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Appetite -->

<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">restaurant</span>
<h3 class="font-body-lg text-body-lg text-primary">Appetite</h3>
</div>
<div class="flex flex-wrap gap-xs">
<button class="option-card px-4 py-2 rounded-full bg-surface-container font-label-sm text-label-sm text-on-surface-variant flex-1 text-center" onclick="selectOption(this, 'appetite')" type="button">Good</button>
<button class="option-card px-4 py-2 rounded-full bg-surface-container font-label-sm text-label-sm text-on-surface-variant flex-1 text-center" onclick="selectOption(this, 'appetite')" type="button">Moderate</button>
<button class="option-card px-4 py-2 rounded-full bg-surface-container font-label-sm text-label-sm text-on-surface-variant flex-1 text-center" onclick="selectOption(this, 'appetite')" type="button">Poor</button>
</div>
</div>
<!-- Drinking -->

</div>

<button class="option-card px-4 py-2 rounded-full bg-surface-container font-label-sm text-label-sm text-on-surface-variant flex-1 text-center" onclick="selectOption(this, 'drinking')" type="button">Low</button>
</div>
</div>
</div>

<button class="w-full h-14 bg-primary text-white font-headline-md text-headline-md rounded-full shadow-lg active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3" onclick="handleSave()" type="button">
<span class="material-symbols-outlined">save</span>

</div>

<span class="material-symbols-outlined">event</span>
<span class="font-label-sm text-label-sm">Appts</span>
</a>

<script>
        function selectOption(element, category) {
            // Find all buttons in the same container
            const container = element.parentElement;
            const buttons = container.querySelectorAll('.option-card');
            
            // Remove active classes
            buttons.forEach(btn => {
                btn.classList.remove('active', 'bg-primary-container', 'text-on-primary-container', 'border-2', 'border-primary');
            });
            
            // Add active styles to clicked button
            element.classList.add('active');
            
            // Add feedback
            element.style.transform = "scale(0.95)";
            setTimeout(() => {
                element.style.transform = "scale(1)";
            }, 100);
        }

        function toggleBinary(element, type) {
            const container = element.parentElement;
            const buttons = container.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white', 'shadow-sm');
                btn.classList.add('text-on-surface-variant');
            });
            
            element.classList.remove('text-on-surface-variant');
            element.classList.add('bg-primary', 'text-white', 'shadow-sm');
        }

        function handleSave() {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            
            // Visual success feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-bounce">check_circle</span> Saved Successfully';
            btn.classList.remove('bg-primary');
            btn.classList.add('bg-on-primary-container', 'text-primary-container');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.add('bg-primary');
                btn.classList.remove('bg-on-primary-container', 'text-primary-container');
            }, 2000);
        }
    </script>
</body></html>
