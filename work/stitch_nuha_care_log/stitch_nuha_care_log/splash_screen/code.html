<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nuha Care | Welcome</title>

                    "on-surface": "#1b1d0e",
                    "on-error-container": "#93000a",

                    "error-container": "#ffdad6",

<style>
        body {
            background-color: #fbfbe2; /* background from theme */
            margin: 0;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-animation {
            animation: floating 4s ease-in-out infinite;
        }

        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .soft-shadow {
            box-shadow: 0 20px 20px -4px rgba(85, 97, 88, 0.06);
        }

        .pulse-soft {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.05); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col items-center justify-center min-h-screen relative p-container-margin">
<!-- Atmospheric Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-24 -left-24 w-64 h-64 rounded-full bg-primary-container/30 blur-3xl"></div>
<div class="absolute bottom-10 -right-20 w-80 h-80 rounded-full bg-tertiary-container/40 blur-3xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center text-center max-w-sm w-full">
<!-- Animated Logo Container -->
<div class="relative mb-lg fade-in-up" style="animation-delay: 0.1s;">
<!-- Outer Pulse -->
<div class="absolute inset-0 rounded-full bg-primary/10 pulse-soft scale-150"></div>
<!-- Logo Card -->
<div class="relative w-32 h-32 bg-white rounded-xl flex items-center justify-center soft-shadow float-animation overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 to-transparent"></div>
<span class="material-symbols-outlined text-primary text-[64px]" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
<!-- Brand Identity -->
<div class="space-y-sm fade-in-up" style="animation-delay: 0.3s;">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                Nuha Care
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[240px] mx-auto">
                Private family care log
            </p>
</div>
<!-- Loading / Progress Indicator (Subtle) -->
<div class="mt-xl w-48 h-1.5 bg-surface-container rounded-full overflow-hidden fade-in-up" style="animation-delay: 0.5s;">
<div class="h-full bg-primary rounded-full w-0 transition-all duration-[3000ms] ease-out" id="progress-bar"></div>
</div>
<!-- Interaction Hint (Optional) -->
<div class="mt-lg fade-in-up opacity-0" style="animation-delay: 0.7s; animation-fill-mode: forwards;">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-widest">
                Preparing your nursery
             </span>
</div>
</main>
<!-- Footer Quote/Micro-copy -->
<footer class="absolute bottom-10 left-0 w-full text-center px-container-margin fade-in-up" style="animation-delay: 0.9s;">
<p class="font-label-sm text-label-sm text-on-surface-variant/60">
            Secure • Encrypted • Family First
        </p>
</footer>
<script>
        // Progress bar simulation for splash feel
        window.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('progress-bar');
            setTimeout(() => {
                bar.style.width = '100%';
            }, 100);

            // Potential redirect logic simulation
            /*
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 3500);
            */
        });

        // Add a gentle mouse-follow effect for desktop atmospheric depth
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            
            const content = document.querySelector('main');
            content.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
