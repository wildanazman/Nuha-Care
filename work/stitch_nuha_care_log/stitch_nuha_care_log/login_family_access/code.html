<style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fbfbe2; /* background from config */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom soft shadow for Gentle Stewardship aesthetic */
        .soft-elevation {
            box-shadow: 0 20px 20px -4px rgba(85, 97, 88, 0.06);
        }

            min-height: 56px;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen flex flex-col overflow-x-hidden">
<!-- Top AppBar (Simplified for Login as per instructions) -->
<header class="w-full px-container-margin py-md flex justify-center items-center">
<h1 class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight">Nuha Care</h1>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-margin pb-xl">
<!-- Illustration Section -->
<div class="w-full max-w-md mb-lg transform transition-all duration-700 ease-out opacity-0 translate-y-4" id="hero-illustration">
<div class="relative w-full aspect-[4/3] rounded-lg overflow-hidden bg-primary-container/30 flex items-center justify-center group">
<img alt="Caregiving Hands Illustration" class="w-full h-full object-cover mix-blend-multiply opacity-80 transition-transform duration-500 group-hover:scale-105" data-alt="A warm and gentle digital illustration depicting two large, soft-textured hands cradling a small seedling with tiny green leaves. The background is a soft gradient of warm creams and pastel greens, reflecting a calm stewardship and caregiving atmosphere. The lighting is ethereal and diffused, creating a serene and safe environment. The overall visual style is modern, minimalist, and emotionally resonant with family care and protection." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuwvU6aGUtDsPcwMe1AkGDq1xQaQ0DRtTMD-MsPAog_eI8JGN_6hUIL2JilznahCz2xf6FN-0ydMDTXbwDVLaKbjxuRunmcK_AtEx17TqmQTWky-dXhH6x4-0-_s55Bb40k-RsFNT9hgqCA6KdoVN6DCEI_Bqz2bxrvFFXJyaH5aOeMuLu6Li3kfI-yAYZ2nUVAAYhgHgTBJwfVN8-raduTXGVdtX7Xg4S2J8LqYJKxIIpnaMCRCT_qo0VW0dB1AZw-LhU0_Gkyg"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
</div>
<!-- Login Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-lg soft-elevation border border-surface-variant/20">
<div class="mb-lg text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant px-md">
                    Only invited family members can access Nuha's care log.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-md" id="login-form">
<!-- Invite Code Field (Primary emphasis for Family Access) -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block ml-xs" for="invite-code">Family Invite Code</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">vibration</span>
<input class="w-full touch-target pl-12 pr-4 bg-surface-container-low border-transparent rounded-DEFAULT font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="invite-code" name="invite-code" placeholder="Enter 6-digit code" type="text"/>
</div>
</div>
<!-- Email/Phone Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase block ml-xs" for="identity">Email or Phone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full touch-target pl-12 pr-4 bg-surface-container-low border-transparent rounded-DEFAULT font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="identity" name="identity" placeholder="caregiver@family.com" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full touch-target bg-primary text-on-primary font-body-lg text-body-lg rounded-full flex items-center justify-center gap-base active:scale-95 transition-all shadow-lg hover:shadow-primary/20" type="submit">
                    Access Care Log
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-lg pt-md border-t border-surface-variant/30 text-center">
<button class="font-label-sm text-label-sm text-primary hover:underline decoration-2 underline-offset-4 transition-all">
                    Request an invite from the primary caregiver
                </button>
</div>
</div>
<!-- Support Info -->
<div class="mt-lg text-center max-w-xs">
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-60">
                Securely managing healthcare journey with privacy and love.
            </p>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animate hero illustration on load
            const hero = document.getElementById('hero-illustration');
            setTimeout(() => {
                hero.classList.remove('opacity-0', 'translate-y-4');
                hero.classList.add('opacity-100', 'translate-y-0');
            }, 100);

            // Button tactile feedback simulation
            const form = document.getElementById('login-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button');
                const originalText = btn.innerHTML;
                
                btn.disabled = true;
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Verifying Access...`;
                
                setTimeout(() => {
                    btn.classList.add('bg-tertiary');
                    btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Welcome Home`;
                    // Redirect simulation
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        btn.classList.remove('bg-tertiary');
                    }, 1500);
                }, 1200);
            });

            // Input focus organic effects
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('scale-[1.02]');
                    input.parentElement.parentElement.classList.add('transition-transform');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('scale-[1.02]');
                });
            });
        });
    </script>
</body></html>
